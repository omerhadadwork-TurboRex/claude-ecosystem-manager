name: Deploy to GitHub Pages

# Builds the Vite frontend and publishes it to GitHub Pages so the
# ecosystem map can be opened from a phone. The hosted site runs in
# read-only offline mode using the bundled snapshot in
# src/data/ecosystem-data.json (the Express backend that reads your
# local ~/.claude/ can't run on Pages).

on:
  push:
    branches:
      - master
      - claude/vercel-phone-access-AElEl
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy at a time; don't cancel an in-progress release.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Pages base path)
        run: npx vite build --base=/${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
